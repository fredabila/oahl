asyncapi: 3.0.0
info:
  title: OAHL Cloud Relay WebSocket Channel
  version: 1.0.0
  description: >
    The bidirectional WebSocket channel used by OAHL Nodes (Providers) to connect to the OAHL Cloud Relay.
    
    This channel (`/ws/provider`) provides a fast-path for commands from Agents to reach the Node, 
    and for the Node to send execution results back to the Cloud Relay.
servers:
  cloudRelay:
    host: oahl.onrender.com
    pathname: /ws/provider
    protocol: wss
    description: Production Cloud Relay server.
    security:
      - bearerAuth: []
channels:
  providerChannel:
    address: /ws/provider
    messages:
      send:
        $ref: '#/components/messages/CloudToNodeMessage'
      receive:
        $ref: '#/components/messages/NodeToCloudMessage'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: The provider API key issued by the OAHL Registry.
  messages:
    CloudToNodeMessage:
      name: CloudToNodeMessage
      title: Cloud to Node Message
      description: Messages sent from the Cloud Relay to the connected Node.
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            description: The type of the message.
            enum:
              - command
              - command-batch
          payload:
            type: object
            description: The actual command payload to execute.
    NodeToCloudMessage:
      name: NodeToCloudMessage
      title: Node to Cloud Message
      description: Messages sent from the Node back to the Cloud Relay.
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            description: The type of the message.
            enum:
              - result
              - result-batch
              - event
          payload:
            type: object
            description: The execution result or event payload.
