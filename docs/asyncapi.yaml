asyncapi: 3.0.0
info:
  title: OAHL Cloud Node Relay WebSocket Channel
  version: 1.0.0
  description: |
    The bi-directional WebSocket channel used by the OAHL Cloud Registry to relay 
    execution payloads to hardware nodes, and for nodes to stream execution results 
    back to the cloud.
    
    This operates exclusively between a Provider Node and the Cloud Control Plane.
    Agents do not connect to this channel.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  production:
    host: oahl.org
    pathname: /ws/provider
    protocol: wss
    description: Production OAHL Cloud Control Plane relay
    security:
      - bearerToken: []

channels:
  providerRelay:
    address: /ws/provider
    messages:
      send:
        $ref: '#/components/messages/ExecuteRequest'
      receive:
        $ref: '#/components/messages/ExecutionResult'

operations:
  receiveExecuteRequest:
    action: receive
    channel:
      $ref: '#/channels/providerRelay'
    summary: Node receives an execution payload from the cloud
    messages:
      - $ref: '#/components/messages/ExecuteRequest'

  sendExecutionResult:
    action: send
    channel:
      $ref: '#/channels/providerRelay'
    summary: Node pushes capability execution results back to the cloud
    messages:
      - $ref: '#/components/messages/ExecutionResult'

components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      description: The provider API key issued during node registration

  messages:
    ExecuteRequest:
      title: Execute Request Payload
      description: Sent by the cloud when an agent calls `POST /v1/sessions/{id}/execute`
      payload:
        $ref: '#/components/schemas/ExecuteRequestPayload'
        
    ExecutionResult:
      title: Execution Result Payload
      description: Sent by the node when a capability completes or fails
      payload:
        $ref: '#/components/schemas/ExecutionResultPayload'

  schemas:
    ExecuteRequestPayload:
      type: object
      required:
        - request_id
        - session_id
        - device_id
        - capability
        - params
      properties:
        request_id:
          type: string
          description: Unique routing identifier generated by the cloud
        session_id:
          type: string
          description: The active agent session ID
        device_id:
          type: string
          description: The target hardware device unique identifier
        capability:
          type: string
          description: The canonical capability name (e.g. `camera.capture`)
        params:
          type: object
          description: Parameters supplied by the agent, fully validated against the capability's JSON Schema by the cloud

    ExecutionResultPayload:
      type: object
      required:
        - schema_version
        - operation_id
        - capability
        - device_id
        - status
        - timestamp
        - completion
      properties:
        schema_version:
          type: string
          enum: ["1.0"]
        operation_id:
          type: string
          description: MUST match the `request_id` from the ExecuteRequest
        capability:
          type: string
        device_id:
          type: string
        status:
          type: string
          enum: ["success", "error"]
        timestamp:
          type: string
          format: date-time
        completion:
          type: object
          required:
            - done
            - state
          properties:
            done:
              type: boolean
            state:
              type: string
              enum: ["completed", "failed", "cancelled", "timeout"]
        data:
          type: object
          description: The successful result output. Omitted if status is error.
        error:
          type: object
          description: The error details. Omitted if status is success.
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
        meta:
          type: object
          properties:
            adapter_id:
              type: string
