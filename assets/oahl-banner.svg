<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid Pattern -->
  <g stroke="#ffffff" stroke-width="1" stroke-opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" />
    </pattern>
    <rect width="1200" height="400" fill="url(#grid)" />
  </g>

  <!-- Connection Lines -->
  <g stroke="url(#glowGrad)" stroke-width="3" fill="none" opacity="0.6">
    <!-- Left to Center -->
    <path d="M 250 200 C 400 200, 450 150, 600 150" stroke-dasharray="10, 5">
      <animate attributeName="stroke-dashoffset" from="15" to="0" dur="1s" repeatCount="indefinite" />
    </path>
    <!-- Right to Center -->
    <path d="M 950 200 C 800 200, 750 150, 600 150" stroke-dasharray="10, 5">
      <animate attributeName="stroke-dashoffset" from="15" to="0" dur="1s" repeatCount="indefinite" />
    </path>
    <!-- Center to Top (Cloud) -->
    <path d="M 600 150 L 600 80" />
  </g>

  <!-- Hardware Node (Left) -->
  <g transform="translate(180, 160)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#1e293b" stroke="#38bdf8" stroke-width="4" filter="url(#glow)" />
    <circle cx="40" cy="40" r="15" fill="#38bdf8" />
    <circle cx="40" cy="40" r="6" fill="#0f172a" />
    <text x="40" y="110" font-family="monospace" font-size="16" fill="#94a3b8" text-anchor="middle">HARDWARE</text>
  </g>

  <!-- AI Agent Node (Right) -->
  <g transform="translate(900, 160)">
    <rect x="0" y="0" width="80" height="80" rx="40" fill="#1e293b" stroke="#c084fc" stroke-width="4" filter="url(#glow)" />
    <polygon points="40,20 60,60 20,60" fill="#c084fc" />
    <text x="40" y="110" font-family="monospace" font-size="16" fill="#94a3b8" text-anchor="middle">AI AGENT</text>
  </g>

  <!-- Center Hub (OAHL Layer) -->
  <g transform="translate(520, 110)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="#334155" stroke="#818cf8" stroke-width="4" filter="url(#glow)" />
    <text x="80" y="48" font-family="sans-serif" font-weight="bold" font-size="32" fill="#ffffff" text-anchor="middle">OAHL</text>
  </g>

  <!-- Main Title -->
  <text x="600" y="300" font-family="sans-serif" font-weight="900" font-size="48" fill="#ffffff" text-anchor="middle" letter-spacing="2">OPEN AGENT HARDWARE LAYER</text>
  
  <!-- Subtitle -->
  <text x="600" y="340" font-family="monospace" font-size="20" fill="#94a3b8" text-anchor="middle">THE PHYSICAL WORLD API FOR AI</text>

  <!-- Status Dots -->
  <circle cx="560" cy="18" r="6" fill="#22c55e" filter="url(#glow)">
     <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <text x="580" y="24" font-family="monospace" font-size="14" fill="#22c55e" font-weight="bold">SYSTEM ONLINE</text>

</svg>
