version: '3.8'

services:
  oahl-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      # Mount configuration if needed
      - ./oahl-config.example.json:/app/oahl-config.json
    # devices:
      # Example of passing USB devices for hardware adapters
      # - /dev/bus/usb:/dev/bus/usb
