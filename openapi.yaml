openapi: 3.0.0
info:
  title: Open Agent Hardware Layer (OAHL) API
  description: A standard REST API enabling AI agents to interact with hardware capabilities via pluggable adapters.
  version: 0.1.0
servers:
  - url: http://localhost:3000
    description: Local Node Server
  - url: https://oahl.onrender.com
    description: Cloud Registry Server
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ExecutionResult:
      type: object
      required:
        - schema_version
        - operation_id
        - status
        - completion
        - capability
        - device_id
        - timestamp
      properties:
        schema_version:
          type: string
          example: "1.0"
        operation_id:
          type: string
        status:
          type: string
          enum: [accepted, in_progress, success, error]
        completion:
          type: object
          required: [done, state]
          properties:
            done:
              type: boolean
            state:
              type: string
              enum: [queued, in_progress, completed, failed]
            progress_pct:
              type: number
              minimum: 0
              maximum: 100
        capability:
          type: string
        device_id:
          type: string
        timestamp:
          type: string
          format: date-time
        data:
          nullable: true
        error:
          type: object
          nullable: true
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
            details:
              nullable: true

paths:
  /v1/capabilities:
    get:
      summary: Get all available hardware devices and their capabilities
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A list of available hardware devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: integer
                  devices:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        capabilities:
                          type: array
                          items:
                            type: string
                        provider:
                          type: string
                        node_id:
                          type: string
                        status:
                          type: string
  /v1/requests:
    post:
      summary: Request a hardware session for a specific capability
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                capability:
                  type: string
                device_id:
                  type: string
                node_id:
                  type: string
      responses:
        '200':
          description: Session assigned
  /v1/sessions/{session_id}/execute:
    post:
      summary: Execute a Capability
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                capability:
                  type: string
                params:
                  type: object
      responses:
        '200':
          description: Execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionResult'
  /v1/sessions/{session_id}/stop:
    post:
      summary: Stop a Session
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session stopped
